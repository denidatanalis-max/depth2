{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Upload Jurnal{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-upload"></i> Upload File Jurnal (Step 03)</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info small">
                    <i class="bi bi-info-circle"></i>
                    Jurnal <strong>"{{ journal.title }}"</strong> telah disetujui Manager. Silakan upload file PDF jurnal Anda.
                </div>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-upload"></i> Upload File</button>
                        <a href="{% url 'journal_detail' journal.pk %}" class="btn btn-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
