<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Depth Culture</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    {% load static %}
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0ede8;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            display: flex;
            width: 860px;
            max-width: 95vw;
            min-height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 20px 60px rgba(80, 20, 0, 0.18),
                0 4px 16px rgba(0, 0, 0, 0.1);
        }

        /* ── Panel kiri — brand ── */
        .panel-left {
            width: 42%;
            background:
                linear-gradient(rgba(0,0,0,0.10), rgba(0,0,0,0.10)),
                url("{% static 'img/background_login2.png' %}");
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .panel-left::after {
            content: '';
            position: absolute;
            bottom: -60px;
            right: -60px;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
        }

        .panel-left::before {
            content: '';
            position: absolute;
            top: -40px;
            left: -40px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
        }

        .brand-area {
            position: relative;
            z-index: 1;
        }

        .brand-icon {
            font-size: 3rem;
            color: #f5d877;
            display: block;
            margin-bottom: 1rem;
        }

        .brand-title {
            color: #ffffff;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        .brand-subtitle {
            color: rgba(255, 235, 180, 0.75);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            line-height: 1.5;
        }

        .panel-tagline {
            position: relative;
            z-index: 1;
            color: rgba(255, 220, 150, 0.55);
            font-size: 0.75rem;
            border-top: 1px solid rgba(255, 220, 150, 0.2);
            padding-top: 1rem;
        }

        /* ── Panel kanan — form ── */
        .panel-right {
            flex: 1;
            background: #ffffff;
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-heading {
            color: #1a0a00;
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .form-subheading {
            color: #9a7a5a;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .form-label {
            color: #4a2e10;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-text {
            background: #fdf8f0;
            border: 1.5px solid #e8d8c0;
            border-right: none;
            color: #8b4513;
        }

        .form-control {
            background: #fdf8f0;
            border: 1.5px solid #e8d8c0;
            border-left: none;
            color: #1a0a00;
            padding: 0.6rem 0.85rem;
        }

        .form-control::placeholder { color: #c8b090; }

        .form-control:focus {
            background: #fff;
            border-color: #c8880a;
            box-shadow: 0 0 0 3px rgba(200, 136, 10, 0.12);
            color: #1a0a00;
        }

        .input-group:focus-within .input-group-text {
            border-color: #c8880a;
            color: #8b0000;
        }

        .btn-login {
            background: linear-gradient(135deg, #7a0000, #a81500);
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            padding: 0.7rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(120, 0, 0, 0.25);
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #8b0000, #c01a00);
            box-shadow: 0 6px 20px rgba(140, 0, 0, 0.35);
            transform: translateY(-1px);
            color: #fff;
        }

        .btn-login:active { transform: translateY(0); }

        .alert {
            background: #fff5f5;
            border: 1px solid #fbb;
            color: #8b0000;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 0.65rem 0.85rem;
        }

        .alert-success {
            background: #f0fff4;
            border-color: #9ae6b4;
            color: #276749;
        }

        /* Responsive: stack di mobile */
        @media (max-width: 640px) {
            .login-box { flex-direction: column; width: 100%; border-radius: 0; min-height: 100vh; }
            .panel-left { width: 100%; padding: 2rem 1.5rem; min-height: auto; }
            .panel-right { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-box">

        <!-- Kiri: brand panel -->
        <div class="panel-left">
            <div class="brand-area">
                <i class="bi bi-journal-text brand-icon"></i>
                <div class="brand-title">Depth<br>Culture</div>
                <p class="brand-subtitle">Sistem Manajemen<br>Jurnal Perusahaan</p>
            </div>
            <div class="panel-tagline">
                © Depth Culture — Internal System
            </div>
        </div>

        <!-- Kanan: form panel -->
        <div class="panel-right">
            <div class="form-heading">Selamat Datang</div>
            <div class="form-subheading">Masuk untuk melanjutkan ke dashboard</div>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} small mb-3">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" name="username" class="form-control"
                            placeholder="Masukkan username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="password" class="form-control"
                            placeholder="Masukkan password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-login w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Masuk
                </button>
            </form>
        </div>

    </div>
</body>
</html>
