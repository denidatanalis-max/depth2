<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Halaman Tidak Ditemukan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/page-404.css' %}">
</head>
<body style="background-image: url({% static 'img/background_login5.jpeg' %})" data-logout-url="{% url 'logout' %}">

    <!-- 4D+1 -->
    <div class="logo-4d">
        <div class="logo-4d-text">
            <span class="text-4d">4D</span>
            <span class="text-plus1">+1</span>
        </div>
        <div class="logo-4d-line"></div>
    </div>

    <!-- Garis dekoratif -->
    <div class="deco-line">
        <div class="line"></div>
        <div class="deco-diamond"></div>
        <div class="line"></div>
        <div class="deco-diamond"></div>
        <div class="line"></div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
        <div class="brand-left">
            <div class="brand-name">THE <span class="depth">DEPTH</span> CULTURE</div>
            <div class="divider-v"></div>
            <div class="brand-tagline">Standardizing Thinking<br>to Drive Better Strategy</div>
        </div>
        <div class="brand-slogan">ONE STANDARD. ONE THINKING. ONE WINNING SYSTEM.</div>
    </div>

    <!-- Card 404 -->
    <div class="wrap">
        <div class="card-404">
            <img src="{% static 'logo/logo.png' %}" alt="Logo" class="logo-404-img">

            <div class="error-code">404</div>
            <div class="error-title">HALAMAN TIDAK <span class="depth">DITEMUKAN</span></div>
            <p class="error-desc">Halaman yang Anda cari tidak tersedia.</p>
            <div class="progress-bar-wrap">
                <div class="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/page-404.js' %}"></script>
</body>
</html>
