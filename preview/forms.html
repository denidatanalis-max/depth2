<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #3a0a00; font-family: 'Segoe UI', sans-serif; }
  .field { margin-bottom: 10px; }
  .form-label { color: rgba(255,220,170,0.9); font-size: 0.82rem; font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-group { display: flex; }
  .input-icon { background:rgba(130,25,5,0.55); border:1px solid rgba(212,175,55,0.35); border-right:none; padding:8px 12px; color:#d4af37; border-radius:8px 0 0 8px; display:flex; align-items:center; }
  .form-control { background:rgba(90,22,5,0.55); border:1px solid rgba(212,175,55,0.35); border-left:none; color:#fff8ee; padding:8px 12px; border-radius:0 8px 8px 0; font-size:0.9rem; flex:1; outline:none; font-family:'Segoe UI',sans-serif; }
  .form-control::placeholder { color:rgba(255,200,150,0.45); }
  .form-control-plain { background:rgba(90,22,5,0.55); border:1px solid rgba(212,175,55,0.35); color:#fff8ee; padding:8px 12px; border-radius:8px; font-size:0.9rem; width:100%; box-sizing:border-box; font-family:'Segoe UI',sans-serif; outline:none; }
  .form-control-plain::placeholder { color:rgba(255,200,150,0.45); }
</style>
</head>
<body>
  <div class="field">
    <label class="form-label">Username</label>
    <div class="input-group">
      <span class="input-icon"><i class="bi bi-person-fill"></i></span>
      <input class="form-control" placeholder="Masukkan username">
    </div>
  </div>
  <div class="field">
    <label class="form-label">Password</label>
    <div class="input-group">
      <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
      <input type="password" class="form-control" placeholder="Masukkan password"
        style="border-left:none; border:1px solid #d4af37; box-shadow:0 0 0 3px rgba(212,175,55,0.15); border-left:none;">
    </div>
  </div>
  <div class="field">
    <label class="form-label" style="text-transform:none; font-size:0.875rem; font-weight:500;">Judul Jurnal</label>
    <input class="form-control-plain" placeholder="Masukkan judul jurnal...">
  </div>
</body>
</html>
