<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #3a0a00; font-family: 'Segoe UI', sans-serif; }
  .section { margin-bottom: 14px; }
  .meta { color: rgba(255,220,170,0.5); font-size: 9px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; }
  .icon-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .icon-cell i { color: #d4af37; font-size: 1.4rem; }
  .icon-cell span { color: rgba(255,220,170,0.55); font-size: 8px; }
</style>
</head>
<body>
  <div class="section">
    <div class="meta">Brand / Identity</div>
    <div class="row">
      <div class="icon-cell">
        <i class="bi bi-journal-text" style="font-size:2.2rem; filter:drop-shadow(0 0 10px rgba(212,175,55,0.4));"></i>
        <span>bi-journal-text</span>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="meta">Navigation</div>
    <div class="row">
      <div class="icon-cell"><i class="bi bi-speedometer2"></i><span>speedometer2</span></div>
      <div class="icon-cell"><i class="bi bi-globe"></i><span>globe</span></div>
      <div class="icon-cell"><i class="bi bi-plus-circle"></i><span>plus-circle</span></div>
      <div class="icon-cell"><i class="bi bi-person-circle"></i><span>person-circle</span></div>
      <div class="icon-cell"><i class="bi bi-box-arrow-left"></i><span>box-arrow-left</span></div>
    </div>
  </div>
  <div class="section">
    <div class="meta">Actions</div>
    <div class="row">
      <div class="icon-cell"><i class="bi bi-eye"></i><span>eye</span></div>
      <div class="icon-cell"><i class="bi bi-pencil-fill"></i><span>pencil-fill</span></div>
      <div class="icon-cell"><i class="bi bi-send"></i><span>send</span></div>
      <div class="icon-cell"><i class="bi bi-check-circle"></i><span>check-circle</span></div>
      <div class="icon-cell"><i class="bi bi-x-circle"></i><span>x-circle</span></div>
      <div class="icon-cell"><i class="bi bi-arrow-counterclockwise"></i><span>arrow-ccw</span></div>
      <div class="icon-cell"><i class="bi bi-upload"></i><span>upload</span></div>
      <div class="icon-cell"><i class="bi bi-file-pdf"></i><span>file-pdf</span></div>
    </div>
  </div>
  <div class="section">
    <div class="meta">Form / Auth</div>
    <div class="row">
      <div class="icon-cell"><i class="bi bi-person-fill"></i><span>person-fill</span></div>
      <div class="icon-cell"><i class="bi bi-lock-fill"></i><span>lock-fill</span></div>
      <div class="icon-cell"><i class="bi bi-box-arrow-in-right"></i><span>box-arrow-in-right</span></div>
    </div>
  </div>
</body>
</html>
