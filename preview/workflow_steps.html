<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; padding: 16px 20px; background: #3a0a00; font-family: 'Segoe UI', sans-serif; color: #fff8ee; }
  .meta { color: rgba(255,220,170,0.5); font-size: 9px; margin-bottom: 8px; text-transform:uppercase; letter-spacing:1px; }
  .step-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 0.8rem; }
  .step { display: inline-flex; align-items: center; gap: 4px; }
  .num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.7rem; }
  .arrow { color: rgba(212,175,55,0.4); font-size: 0.7rem; }
</style>
</head>
<body>
  <div class="meta">Journal workflow — active at Step 04</div>
  <div class="step-row">
    <div class="step">
      <span class="num" style="background:#004d1a; border:1px solid rgba(77,255,140,0.4); color:#a8ffcc;">01</span>
      <span style="color:rgba(168,255,204,0.75); font-size:0.75rem;">Draft</span>
    </div>
    <span class="arrow">›</span>
    <div class="step">
      <span class="num" style="background:#004d1a; border:1px solid rgba(77,255,140,0.4); color:#a8ffcc;">02</span>
      <span style="color:rgba(168,255,204,0.75); font-size:0.75rem;">Submitted</span>
    </div>
    <span class="arrow">›</span>
    <div class="step">
      <span class="num" style="background:#004d1a; border:1px solid rgba(77,255,140,0.4); color:#a8ffcc;">03</span>
      <span style="color:rgba(168,255,204,0.75); font-size:0.75rem;">Approved</span>
    </div>
    <span class="arrow">›</span>
    <div class="step">
      <span class="num" style="background:#8b0000; border:1px solid #d4af37; color:#ffeebb;">04</span>
      <span style="color:#d4af37; font-weight:600; font-size:0.75rem;">Upload PDF</span>
    </div>
    <span class="arrow">›</span>
    <div class="step">
      <span class="num" style="background:rgba(212,175,55,0.18); border:1px solid rgba(212,175,55,0.35); color:rgba(255,220,170,0.65);">05</span>
      <span style="color:rgba(255,220,170,0.6); font-size:0.75rem;">Review File</span>
    </div>
    <span class="arrow">›</span>
    <div class="step">
      <span class="num" style="background:rgba(212,175,55,0.18); border:1px solid rgba(212,175,55,0.35); color:rgba(255,220,170,0.65);">06</span>
      <span style="color:rgba(255,220,170,0.6); font-size:0.75rem;">Scoring</span>
    </div>
    <span class="arrow">›</span>
    <div class="step">
      <span class="num" style="background:rgba(212,175,55,0.18); border:1px solid rgba(212,175,55,0.35); color:rgba(255,220,170,0.65);">07</span>
      <span style="color:rgba(255,220,170,0.6); font-size:0.75rem;">Rekomendasi</span>
    </div>
    <span class="arrow">›</span>
    <div class="step">
      <span class="num" style="background:rgba(212,175,55,0.18); border:1px solid rgba(212,175,55,0.35); color:rgba(255,220,170,0.65);">08</span>
      <span style="color:rgba(255,220,170,0.6); font-size:0.75rem;">Publikasi</span>
    </div>
  </div>
</body>
</html>
