<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #3a0a00; font-family: 'Segoe UI', sans-serif; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; align-items: flex-start; }
  .meta { color: rgba(255,220,170,0.5); font-size: 9px; margin-bottom: 4px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; letter-spacing: 0.3px; font-family: 'Segoe UI', sans-serif; }
</style>
</head>
<body>
  <div class="meta">Primary / Danger</div>
  <div class="row">
    <button class="btn" style="background:linear-gradient(135deg,#7a0000,#b80000); border:1px solid rgba(212,175,55,0.45); color:#ffeebb; box-shadow:0 3px 14px rgba(120,0,0,0.5);">
      <i class="bi bi-plus-circle"></i> Buat Jurnal Baru
    </button>
    <button class="btn" style="background:linear-gradient(135deg,#7a0000,#b80000); border:1px solid rgba(212,175,55,0.45); color:#ffeebb; box-shadow:0 3px 14px rgba(120,0,0,0.5);">
      <i class="bi bi-box-arrow-in-right"></i> Masuk
    </button>
  </div>
  <div class="meta">Success</div>
  <div class="row">
    <button class="btn" style="background:linear-gradient(135deg,#004d1a,#006622); border:1px solid rgba(212,175,55,0.35); color:#ccffdd;">
      <i class="bi bi-check-circle"></i> Setujui
    </button>
  </div>
  <div class="meta">Warning</div>
  <div class="row">
    <button class="btn" style="background:linear-gradient(135deg,#7a4800,#b86b00); border:1px solid rgba(212,175,55,0.4); color:#fff3cc;">
      <i class="bi bi-arrow-counterclockwise"></i> Revisi
    </button>
  </div>
  <div class="meta">Secondary / Outline</div>
  <div class="row">
    <button class="btn" style="background:rgba(90,22,5,0.55); border:1px solid rgba(212,175,55,0.3); color:rgba(255,220,170,0.9);">
      <i class="bi bi-x-circle"></i> Batal
    </button>
    <button class="btn" style="background:transparent; border:1px solid rgba(212,175,55,0.5); color:#d4af37;">
      <i class="bi bi-eye"></i> Lihat
    </button>
  </div>
  <div class="meta">Small</div>
  <div class="row">
    <button class="btn" style="background:transparent; border:1px solid rgba(212,175,55,0.5); color:#d4af37; padding:4px 10px; font-size:0.78rem;">
      <i class="bi bi-eye"></i> Lihat
    </button>
    <button class="btn" style="background:linear-gradient(135deg,#7a0000,#b80000); border:1px solid rgba(212,175,55,0.45); color:#ffeebb; padding:4px 10px; font-size:0.78rem;">
      <i class="bi bi-send"></i> Kirim
    </button>
  </div>
</body>
</html>
