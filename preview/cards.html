<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #3a0a00; font-family: 'Segoe UI', sans-serif; }
  .card { background:rgba(90,22,5,0.68); border:1px solid rgba(212,175,55,0.3); border-radius:12px; overflow:hidden; box-shadow:0 0 0 1px rgba(139,0,0,0.25), 0 4px 24px rgba(0,0,0,0.4); margin-bottom: 12px; }
  .card-header { background:rgba(160,35,5,0.70); border-bottom:1px solid rgba(212,175,55,0.3); padding:10px 16px; color:#d4af37; font-weight:600; font-size:0.9rem; display:flex; align-items:center; gap:8px; }
  .card-body { padding:14px 16px; color:#fff8ee; font-size:0.875rem; }
  .meta { color: rgba(255,220,170,0.5); font-size: 9px; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="meta">Standard Card</div>
  <div class="card">
    <div class="card-header"><i class="bi bi-journal-text"></i> Detail Jurnal</div>
    <div class="card-body">
      <div style="color:#d4af37; font-weight:600; margin-bottom:4px;">Analisis Metodologi Riset Internal 2024</div>
      <div style="color:rgba(255,220,170,0.75); font-size:0.82rem;">Andi Pratama · <span style="color:rgba(255,220,170,0.55);">12 Apr 2025</span></div>
    </div>
  </div>
  <div class="meta">Stat Cards</div>
  <div style="display:flex; gap:10px;">
    <div class="card" style="flex:1; border-left:4px solid #4da6ff; padding:12px 14px;">
      <div style="color:rgba(255,220,170,0.75); font-size:0.78rem;">Total Jurnal</div>
      <div style="color:#fff8ee; font-size:1.6rem; font-weight:700;">24</div>
    </div>
    <div class="card" style="flex:1; border-left:4px solid #4dffaa; padding:12px 14px;">
      <div style="color:rgba(255,220,170,0.75); font-size:0.78rem;">Diverifikasi</div>
      <div style="color:#fff8ee; font-size:1.6rem; font-weight:700;">11</div>
    </div>
    <div class="card" style="flex:1; border-left:4px solid #ffb84d; padding:12px 14px;">
      <div style="color:rgba(255,220,170,0.75); font-size:0.78rem;">Menunggu</div>
      <div style="color:#fff8ee; font-size:1.6rem; font-weight:700;">7</div>
    </div>
  </div>
</body>
</html>
