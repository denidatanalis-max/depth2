<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { margin: 0; padding: 0; background: #3a0a00; font-family: 'Segoe UI', sans-serif; height: 180px; overflow: hidden; }
  .sidebar { width: 220px; height: 180px; background: linear-gradient(180deg, rgba(115,18,5,0.95) 0%, rgba(65,10,0,0.98) 100%); border-right: 1px solid rgba(212,175,55,0.3); display: flex; flex-direction: column; }
  .brand { padding: 14px 16px 10px; border-bottom: 1px solid rgba(212,175,55,0.25); }
  .brand-name { color: #d4af37; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px; filter: drop-shadow(0 0 6px rgba(212,175,55,0.4)); }
  .brand-sub { color: rgba(255,220,170,0.65); font-size: 0.7rem; }
  nav { flex: 1; padding: 4px 0; }
  .nav-link { padding: 8px 16px; color: rgba(255,220,170,0.75); font-size: 0.85rem; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .nav-link.active { color: #d4af37; background: rgba(160,30,5,0.50); border-left: 3px solid #d4af37; padding-left: 13px; font-weight: 600; }
  .footer { padding: 10px 16px; border-top: 1px solid rgba(212,175,55,0.2); font-size: 0.78rem; }
  .user { color: rgba(255,220,170,0.9); font-weight: 500; margin-bottom: 2px; }
  .badge { background: rgba(139,0,0,0.65); border: 1px solid rgba(212,175,55,0.4); color: #d4af37; font-size: 0.7rem; padding: 1px 7px; border-radius: 20px; }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="brand">
      <div class="brand-name"><i class="bi bi-journal-text"></i> Depth Culture</div>
      <div class="brand-sub">Sistem Manajemen Jurnal</div>
    </div>
    <nav>
      <div class="nav-link"><i class="bi bi-globe"></i> Publikasi</div>
      <div class="nav-link active"><i class="bi bi-speedometer2"></i> Dashboard</div>
      <div class="nav-link"><i class="bi bi-plus-circle"></i> Buat Jurnal Baru</div>
    </nav>
    <div class="footer">
      <div class="user"><i class="bi bi-person-circle"></i> Andi Pratama</div>
      <span class="badge">Writer</span>
    </div>
  </div>
</body>
</html>
