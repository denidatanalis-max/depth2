<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #3a0a00; font-family: 'Segoe UI', sans-serif; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .meta { color: rgba(255,220,170,0.5); font-size: 9px; width: 80px; flex-shrink: 0; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Nav Active</div>
    <div style="background:rgba(139,0,0,0.55); border-left:3px solid #d4af37; padding:8px 14px; color:#d4af37; font-size:0.9rem; font-weight:600; display:flex; align-items:center; gap:6px; width:160px;">
      <i class="bi bi-speedometer2"></i> Dashboard
    </div>
  </div>
  <div class="row">
    <div class="meta">Nav Default</div>
    <div style="padding:8px 14px; color:rgba(255,220,170,0.75); font-size:0.9rem; display:flex; align-items:center; gap:6px; width:160px;">
      <i class="bi bi-globe"></i> Publikasi
    </div>
  </div>
  <div class="row">
    <div class="meta">Badge Role</div>
    <span class="badge" style="background:rgba(139,0,0,0.65); border:1px solid rgba(212,175,55,0.4); color:#d4af37;">Writer</span>
    <span class="badge" style="background:rgba(139,0,0,0.65); border:1px solid rgba(212,175,55,0.4); color:#d4af37;">Manager</span>
    <span class="badge" style="background:rgba(139,0,0,0.65); border:1px solid rgba(212,175,55,0.4); color:#d4af37;">Admin</span>
  </div>
  <div class="row">
    <div class="meta">Status</div>
    <span class="badge" style="background:rgba(60,60,60,0.6); color:#ccc;">Draft</span>
    <span class="badge" style="background:rgba(0,30,80,0.65); color:#a0d8ff;">Submitted</span>
    <span class="badge" style="background:rgba(0,60,20,0.65); color:#a8ffcc;">Approved</span>
    <span class="badge" style="background:rgba(90,0,0,0.65); color:#ffb3b3;">Rejected</span>
  </div>
  <div class="row">
    <div class="meta">Status Flow</div>
    <span class="badge" style="background:rgba(70,35,0,0.65); color:#ffe4a0;">Scoring</span>
    <span class="badge" style="background:rgba(0,45,70,0.65); color:#a0d8ff;">Rekomendasi</span>
    <span class="badge" style="background:rgba(0,80,20,0.65); color:#a8ffcc;">Published</span>
  </div>
</body>
</html>
