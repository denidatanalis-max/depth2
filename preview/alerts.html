<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  body { margin: 0; padding: 16px 20px; background: #3a0a00; font-family: 'Segoe UI', sans-serif; }
  .alert { border-radius: 10px; font-size: 0.875rem; padding: 10px 14px; margin-bottom: 8px; border: 1px solid; display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
  <div class="alert" style="background:rgba(0,70,25,0.50); border-color:rgba(77,255,140,0.35); color:#a8ffcc;">
    <i class="bi bi-check-circle-fill"></i> Jurnal berhasil diajukan ke Manager.
  </div>
  <div class="alert" style="background:rgba(100,10,0,0.50); border-color:rgba(212,175,55,0.35); color:#ffb3b3;">
    <i class="bi bi-exclamation-triangle-fill"></i> Jurnal ditolak. Silakan revisi judul dan ringkasan.
  </div>
  <div class="alert" style="background:rgba(80,40,0,0.50); border-color:rgba(212,175,55,0.40); color:#ffe4a0;">
    <i class="bi bi-info-circle-fill"></i> Jurnal sedang menunggu review file PDF oleh Manager.
  </div>
  <div class="alert" style="background:rgba(0,40,80,0.50); border-color:rgba(100,180,255,0.35); color:#a0d8ff;">
    <i class="bi bi-info-circle"></i> Jurnal telah dikirim ke Tim Scoring untuk penilaian.
  </div>
</body>
</html>
